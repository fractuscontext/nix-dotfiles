---
- name: Block Apple update/OCSP domains in /etc/hosts
  become: true
  ansible.builtin.lineinfile:
    path: /etc/hosts
    line: "127.0.0.1 {{ item }}"
    state: present
  loop: "{{ blocked_domains }}"

- name: Flush DNS cache
  become: true
  ansible.builtin.command: killall -HUP mDNSResponder
  changed_when: true
